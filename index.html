<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌊 Mar del Plata</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --sand: #f5e6c8; --wave: #2e7da8; --sun: #f4a923; --coral: #e8635a;
  --dark: #0d2235; --mid: #1e4a68; --glass: rgba(255,255,255,0.05);
  --glass-b: rgba(255,255,255,0.09); --tomi: #f4a923; --ara: #e8635a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--sand); min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }
.bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 15% 60%, rgba(46,125,168,0.18) 0%, transparent 55%), radial-gradient(ellipse at 85% 10%, rgba(244,169,35,0.09) 0%, transparent 50%), linear-gradient(180deg, #0a1e30 0%, #0d2235 60%, #0a1e30 100%); }

/* LOGIN */
#login-screen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; background: linear-gradient(180deg, #0a1e30 0%, #0d2235 100%); }
.login-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, var(--sand) 0%, var(--sun) 60%, var(--coral) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; line-height: 1.1; margin-bottom: 8px; }
.login-sub { color: rgba(245,230,200,0.45); font-size: 0.9rem; margin-bottom: 40px; text-align: center; }
.login-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(245,230,200,0.4); margin-bottom: 14px; }
.user-cards { display: flex; gap: 16px; width: 100%; max-width: 320px; }
.user-card { flex: 1; padding: 28px 16px; background: var(--glass); border: 2px solid var(--glass-b); border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; transition: all 0.22s; user-select: none; }
.user-card:active { transform: scale(0.95); }
.user-card.tomi { border-color: rgba(244,169,35,0.3); }
.user-card.tomi:active { background: rgba(244,169,35,0.12); border-color: var(--tomi); }
.user-card.ara { border-color: rgba(232,99,90,0.3); }
.user-card.ara:active { background: rgba(232,99,90,0.12); border-color: var(--ara); }
.user-card .av { font-size: 3rem; line-height: 1; }
.user-card .nm { font-size: 1.1rem; font-weight: 700; }

/* APP */
#app { position: relative; z-index: 1; display: none; }

/* HEADER */
header { padding: 18px 16px 0; display: flex; align-items: flex-start; justify-content: space-between; }
.header-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, var(--sand), var(--sun)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
.you-badge { font-size: 0.66rem; color: rgba(245,230,200,0.32); margin-top: 2px; }
.presence-pill { display: flex; align-items: center; gap: 6px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 20px; padding: 6px 11px; font-size: 0.72rem; color: rgba(245,230,200,0.45); transition: all 0.3s; white-space: nowrap; margin-top: 2px; }
.presence-pill.online { border-color: rgba(76,175,80,0.4); color: #7ed98a; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(245,230,200,0.2); transition: background 0.3s; flex-shrink: 0; }
.presence-pill.online .dot { background: #4caf50; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

/* WEATHER */
#weather-widget { margin: 12px 16px 0; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
.w-icon { font-size: 2rem; line-height: 1; }
.w-info { flex: 1; }
.w-temp { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--sun); line-height: 1; }
.w-desc { font-size: 0.72rem; color: rgba(245,230,200,0.5); text-transform: capitalize; margin-top: 2px; }
.w-details { font-size: 0.68rem; color: rgba(245,230,200,0.35); margin-top: 3px; }
.w-city { font-size: 0.7rem; color: rgba(245,230,200,0.4); text-align: right; }
#weather-widget.loading { opacity: 0.5; }

/* TABS */
.tabs { display: flex; gap: 5px; padding: 12px 16px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 8px 10px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 11px; color: rgba(245,230,200,0.38); font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 500; cursor: pointer; transition: all 0.18s; text-align: center; line-height: 1.4; -webkit-appearance: none; min-width: 60px; }
.tab .ti { font-size: 1rem; display: block; margin-bottom: 1px; }
.tab.active { background: var(--mid); border-color: rgba(46,125,168,0.5); color: var(--sand); }

/* SECTIONS */
.section { display: none; padding: 14px 16px 0; }
.section.active { display: block; }

/* ADD FORM */
.add-form { display: flex; gap: 8px; margin-bottom: 14px; }
.add-form input { flex: 1; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 11px; padding: 11px 13px; color: var(--sand); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; -webkit-appearance: none; }
.add-form input::placeholder { color: rgba(245,230,200,0.22); }
.add-form input:focus { border-color: var(--wave); }
.add-form button { background: var(--wave); border: none; border-radius: 11px; padding: 11px 15px; color: white; font-size: 1.3rem; cursor: pointer; min-width: 46px; -webkit-appearance: none; }

/* PROGRESS */
.prog-label { font-size: 0.7rem; color: rgba(245,230,200,0.32); margin-bottom: 5px; }
.prog-wrap { background: rgba(255,255,255,0.06); border-radius: 20px; height: 5px; margin-bottom: 16px; overflow: hidden; }
.prog-bar { height: 100%; background: linear-gradient(90deg, var(--wave), var(--sun)); border-radius: 20px; transition: width 0.4s ease; }

/* WHO */
.who-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.who-row span { font-size: 0.72rem; color: rgba(245,230,200,0.32); }
.who-btn { padding: 5px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: rgba(245,230,200,0.42); font-family: 'DM Sans', sans-serif; font-size: 0.76rem; cursor: pointer; -webkit-appearance: none; }
.who-btn.active { font-weight: 600; }
.who-btn[data-who="Los 2"].active { background: rgba(46,125,168,0.22); border-color: var(--wave); color: #7ec8e3; }
.who-btn[data-who="Tomi"].active { background: rgba(244,169,35,0.18); border-color: var(--tomi); color: var(--tomi); }
.who-btn[data-who="Ara"].active { background: rgba(232,99,90,0.18); border-color: var(--ara); color: var(--ara); }

/* ITEMS */
.cat-header { font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245,230,200,0.28); margin-bottom: 7px; padding-left: 2px; }
.item { display: flex; align-items: center; gap: 10px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 11px; padding: 12px 11px; margin-bottom: 6px; }
.item.checked { background: rgba(76,175,80,0.06); border-color: rgba(76,175,80,0.18); }
.item.checked .item-text { text-decoration: line-through; color: rgba(245,230,200,0.28); }
.chk { width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.18); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; flex-shrink: 0; -webkit-appearance: none; }
.item.checked .chk { background: #4caf50; border-color: #4caf50; color: white; }
.item-text { flex: 1; font-size: 0.88rem; line-height: 1.3; }
.del-btn { background: none; border: none; color: rgba(245,230,200,0.16); cursor: pointer; font-size: 1rem; padding: 4px 6px; flex-shrink: 0; -webkit-appearance: none; }
.empty { text-align: center; padding: 36px 20px; color: rgba(245,230,200,0.2); font-size: 0.86rem; }
.empty-icon { font-size: 2rem; display: block; margin-bottom: 8px; }

/* MAP */
#map-section { display: none; padding: 0; flex-direction: column; height: calc(100vh - 180px); }
#map-section.active { display: flex; }
.map-toolbar { padding: 12px 16px; display: flex; gap: 8px; align-items: center; }
.map-toolbar input { flex: 1; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 11px; padding: 10px 13px; color: var(--sand); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; -webkit-appearance: none; }
.map-toolbar input::placeholder { color: rgba(245,230,200,0.22); }
.map-toolbar button { background: var(--wave); border: none; border-radius: 11px; padding: 10px 14px; color: white; font-size: 0.82rem; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; -webkit-appearance: none; }
#leaflet-map { flex: 1; }
.map-type-row { display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.map-type-row::-webkit-scrollbar { display: none; }
.map-type-wrap { position: relative; flex-shrink: 0; }
.map-type-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: rgba(245,230,200,0.42); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; cursor: pointer; white-space: nowrap; -webkit-appearance: none; }
.map-type-btn.active { background: rgba(46,125,168,0.22); border-color: var(--wave); color: #7ec8e3; }
.map-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; background: #0d2235; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; min-width: 190px; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.6); max-height: 260px; overflow-y: auto; }
.map-dropdown.open { display: block; }
.map-dd-item { padding: 10px 14px; font-size: 0.82rem; color: var(--sand); cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.map-dd-item:last-child { border-bottom: none; }
.map-dd-item:active { background: rgba(46,125,168,0.2); }
.map-dd-empty { padding: 14px; font-size: 0.78rem; color: rgba(245,230,200,0.3); text-align: center; }
.leaflet-popup-content-wrapper { background: #0d2235 !important; border: 1px solid rgba(255,255,255,0.12) !important; color: var(--sand) !important; border-radius: 12px !important; }
.leaflet-popup-tip { background: #0d2235 !important; }
.place-popup { padding: 4px; }
.place-popup h4 { font-size: 0.9rem; margin-bottom: 4px; color: var(--sand); }
.place-popup p { font-size: 0.75rem; color: rgba(245,230,200,0.5); margin-bottom: 8px; }
.place-popup-btns { display: flex; gap: 6px; }
.place-popup-btns button { flex: 1; padding: 6px 8px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; cursor: pointer; }
.btn-visit-green { background: rgba(76,175,80,0.2); color: #7ed98a; border: 1px solid rgba(76,175,80,0.3) !important; }
.btn-visit-red { background: rgba(232,99,90,0.2); color: var(--coral); border: 1px solid rgba(232,99,90,0.3) !important; }
.btn-del-place { background: rgba(232,99,90,0.2); color: var(--coral); border: 1px solid rgba(232,99,90,0.3) !important; }

/* GASTOS */
#gastos-section .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 14px; }
.gasto-totals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px; }
.total-card { background: var(--glass); border: 1px solid var(--glass-b); border-radius: 12px; padding: 12px; text-align: center; }
.total-card .tc-label { font-size: 0.65rem; color: rgba(245,230,200,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.total-card .tc-amount { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
.total-card.shared .tc-amount { color: var(--wave); }
.total-card.tomi-card .tc-amount { color: var(--tomi); }
.total-card.ara-card .tc-amount { color: var(--ara); }
.total-general-card { margin-top: 8px; margin-bottom: 20px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 12px; padding: 14px; text-align: center; }
.total-general-label { font-size: 0.65rem; color: rgba(245,230,200,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.total-general-amount { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--sand); }
.gasto-form { background: var(--glass); border: 1px solid var(--glass-b); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
.gasto-form-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,230,200,0.35); margin-bottom: 12px; }
.gasto-type-row { display: flex; gap: 6px; margin-bottom: 12px; }
.gasto-type-btn { flex: 1; padding: 8px 4px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: rgba(245,230,200,0.42); font-family: 'DM Sans', sans-serif; font-size: 0.76rem; cursor: pointer; text-align: center; -webkit-appearance: none; }
.gasto-type-btn.active { font-weight: 600; }
.gasto-type-btn[data-gtype="compartido"].active { background: rgba(46,125,168,0.22); border-color: var(--wave); color: #7ec8e3; }
.gasto-type-btn[data-gtype="Tomi"].active { background: rgba(244,169,35,0.18); border-color: var(--tomi); color: var(--tomi); }
.gasto-type-btn[data-gtype="Ara"].active { background: rgba(232,99,90,0.18); border-color: var(--ara); color: var(--ara); }
.gasto-inputs { display: flex; gap: 8px; margin-bottom: 10px; }
.gasto-inputs input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-b); border-radius: 10px; padding: 10px 12px; color: var(--sand); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; -webkit-appearance: none; }
.gasto-inputs input::placeholder { color: rgba(245,230,200,0.22); }
.foto-area { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.foto-btn { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.15); border-radius: 10px; padding: 9px 14px; color: rgba(245,230,200,0.45); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; cursor: pointer; flex: 1; -webkit-appearance: none; }
.foto-preview { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; display: none; }
.ocr-status { font-size: 0.72rem; color: rgba(245,230,200,0.35); font-style: italic; margin-bottom: 10px; min-height: 18px; }
.btn-agregar-gasto { width: 100%; background: var(--wave); border: none; border-radius: 11px; padding: 12px; color: white; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
.gasto-item { background: var(--glass); border: 1px solid var(--glass-b); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.gasto-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.gasto-item-desc { font-size: 0.88rem; flex: 1; }
.gasto-item-amount { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
.gasto-item-amount.compartido { color: var(--wave); }
.gasto-item-amount.tomi { color: var(--tomi); }
.gasto-item-amount.ara { color: var(--ara); }
.gasto-item-meta { display: flex; justify-content: space-between; align-items: center; }
.gasto-item-tag { font-size: 0.65rem; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
.tag-compartido { background: rgba(46,125,168,0.2); color: #7ec8e3; }
.tag-tomi { background: rgba(244,169,35,0.18); color: var(--tomi); }
.tag-ara { background: rgba(232,99,90,0.18); color: var(--ara); }
.gasto-item-each { font-size: 0.7rem; color: rgba(245,230,200,0.35); }
.gasto-del { background: none; border: none; color: rgba(245,230,200,0.16); cursor: pointer; font-size: 0.9rem; padding: 2px 4px; -webkit-appearance: none; }
.gasto-ticket-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; cursor: pointer; margin-left: 6px; }

/* LIGHTBOX */
#lightbox { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
#lightbox.show { display: flex; }
#lightbox img { max-width: 100%; max-height: 80vh; border-radius: 12px; }
#lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 1.5rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* CHAT */
#chat-section { display: none; padding: 0; flex-direction: column; height: calc(100vh - 180px); }
#chat-section.active { display: flex; }
.chat-header-bar { padding: 12px 16px 10px; border-bottom: 1px solid var(--glass-b); }
.chat-header-bar .cht { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
.chat-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; display: flex; flex-direction: column; gap: 9px; }
.msg { max-width: 78%; }
.msg.mine { align-self: flex-end; }
.msg.theirs { align-self: flex-start; }
.msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.88rem; line-height: 1.4; word-break: break-word; }
.msg.mine .msg-bubble { background: var(--mid); border-bottom-right-radius: 5px; }
.msg.theirs .msg-bubble { background: rgba(232,99,90,0.14); border: 1px solid rgba(232,99,90,0.22); border-bottom-left-radius: 5px; }
.msg-meta { font-size: 0.62rem; color: rgba(245,230,200,0.28); margin-top: 3px; padding: 0 4px; }
.msg.mine .msg-meta { text-align: right; }
.typing-indicator { font-size: 0.72rem; color: rgba(245,230,200,0.28); padding: 6px 16px 4px; min-height: 24px; font-style: italic; }
.chat-input-area { display: flex; gap: 8px; padding: 10px 14px 12px; background: rgba(10,28,46,0.97); border-top: 1px solid var(--glass-b); }
.chat-input-area input { flex: 1; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 24px; padding: 10px 15px; color: var(--sand); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; -webkit-appearance: none; }
.chat-input-area input::placeholder { color: rgba(245,230,200,0.22); }
.send-btn { background: var(--coral); border: none; border-radius: 50%; width: 42px; height: 42px; color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-appearance: none; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(10,28,46,0.97); border-top: 1px solid var(--glass-b); display: flex; padding: 8px 8px env(safe-area-inset-bottom, 10px); gap: 3px; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 7px 2px; border-radius: 11px; border: none; background: transparent; color: rgba(245,230,200,0.32); font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 500; cursor: pointer; position: relative; -webkit-appearance: none; }
.nav-btn .ni { font-size: 1.15rem; }
.nav-btn.active { color: var(--sand); background: var(--glass); }
.chat-badge { position: absolute; top: 3px; right: 14%; background: var(--coral); color: white; font-size: 0.55rem; font-weight: 700; border-radius: 10px; padding: 1px 4px; min-width: 15px; text-align: center; display: none; }
.chat-badge.show { display: block; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg"></div>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div id="login-screen">
  <div class="login-title">🌊 Mar del Plata</div>
  <div class="login-sub">Bahía Blanca → la costa 🌅</div>
  <div class="login-label">¿Quién sos?</div>
  <div class="user-cards">
    <div class="user-card tomi" onclick="doLogin('Tomi')">
      <div class="av">🧑‍🦱</div>
      <div class="nm" style="color:var(--tomi)">Tomi</div>
    </div>
    <div class="user-card ara" onclick="doLogin('Ara')">
      <div class="av">👩‍🦱</div>
      <div class="nm" style="color:var(--ara)">Ara</div>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div>
      <div class="header-title" onclick="cerrarSesion()">🌊 Mar del Plata</div>

<script>
var firebaseConfig = {

var WEATHER_KEY = 'da94a7fed910f8df6dd7019bd0fba40e';
var VISION_KEY = 'AIzaSyBdE-lVznp36Y0oDG6QuxP2qv_VkChj3Xs';

var currentUser = null;
var currentWho = 'Los 2';

var lists = { personal:{}, bahia:{}, mdp:{} };

var ticketPhotoBase64 = null;

var DEFAULTS = {

    {text:'Ropa para salir',who:'Los 2',checked:false},

};

function loadWeather() {
  fetch('https://api.openweathermap.org/data/2.5/weather?q=Mar+del+Plata,AR&appid=' + WEATHER_KEY + '&units=metric&lang=es')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var icons = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'⛅','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️','11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'};
      document.getElementById('weather-widget').classList.remove('loading');
      document.getElementById('w-icon').textContent = icons[d.weather[0].icon] || '🌡️';
      document.getElementById('w-temp').textContent = Math.round(d.main.temp) + '°C';
      document.getElementById('w-desc').textContent = d.weather[0].description;
      document.getElementById('w-details').textContent = '💧 ' + d.main.humidity + '%  💨 ' + Math.round(d.wind.speed) + ' km/h  🌡 Sensación ' + Math.round(d.main.feels_like) + '°';
    })
    .catch(function() {
      document.getElementById('weather-widget').classList.remove('loading');
      document.getElementById('w-icon').textContent = '🌡️';
      document.getElementById('w-temp').textContent = '--°';
      document.getElementById('w-desc').textContent = 'Sin conexión';
    });
}

function doLogin(user) {
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('you-badge').textContent = 'Conectado como ' + user;
  loadWeather();

  var presRef = db.ref('presence/' + user);
  presRef.set({ online: true, ts: firebase.database.ServerValue.TIMESTAMP });
  presRef.onDisconnect().set({ online: false, ts: firebase.database.ServerValue.TIMESTAMP });

  var other = user === 'Tomi' ? 'Ara' : 'Tomi';

  db.ref('presence/' + other).on('value', function(snap) {
    var d = snap.val();
    var pill = document.getElementById('presence-pill');
    var txt = document.getElementById('presence-text');
    if (d && d.online) {
      pill.className = 'presence-pill online';
      txt.textContent = other + ' en línea 🟢';
    } else {
      pill.className = 'presence-pill';
      txt.textContent = other + ' desconectada 🔴';
    }
  });

  db.ref('typing/' + other).on('value', function(snap) {
    var d = snap.val();
    document.getElementById('typing-indicator').textContent = (d && d.typing) ? other + ' está escribiendo...' : '';
  });

  ['personal','bahia','mdp'].forEach(function(tab) {
    db.ref('lists/' + tab).on('value', function(snap) {
      var val = snap.val();
      if (!val && !seeded[tab]) {
        seeded[tab] = true;
        DEFAULTS[tab].forEach(function(item) {
          db.ref('lists/' + tab).push(Object.assign({}, item, {ts: Date.now()}));
        });
      } else if (val) {
        seeded[tab] = true;
        lists[tab] = val;
        renderList(tab);
      }
    });
  });

  db.ref('messages').on('value', function(snap) {
    messages = snap.val() || {};
    renderMessages();
    if (!inChat) {
      unreadCount = Object.keys(messages).filter(function(k) {
        return k > lastSeenMsg && messages[k].from !== currentUser;
      }).length;
      updateChatBadge();
    }
  });

  db.ref('gastos').on('value', function(snap) {
    gastos = snap.val() || {};
    renderGastos();
  });

  db.ref('places').on('value', function(snap) {
    places = snap.val() || {};
    renderMapMarkers();
  });
}

function cerrarSesion() {
  if (currentUser) {
    db.ref('presence/' + currentUser).set({ online: false, ts: firebase.database.ServerValue.TIMESTAMP });
  }
  currentUser = null;
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  mapMarkers = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

document.addEventListener('visibilitychange', function() {
  if (!currentUser) return;
  db.ref('presence/' + currentUser).set({ online: !document.hidden, ts: firebase.database.ServerValue.TIMESTAMP });
});

function switchTab(tab) {
  currentTab = tab;
  inChat = (tab === 'chat');
  var listTabs = ['personal','bahia','mdp'];
  var isListTab = listTabs.indexOf(tab) !== -1;
  document.getElementById('main-tabs').style.display = isListTab ? 'flex' : 'none';
  listTabs.forEach(function(t) {
    var btn = document.getElementById('tab-btn-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  var navListas = document.getElementById('nav-listas');
  if (navListas) navListas.classList.toggle('active', isListTab);
  ['map','gastos','chat'].forEach(function(t) {
    var nb = document.getElementById('nav-' + t);
    if (nb) nb.classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  if (tab === 'chat') {
    document.getElementById('chat-section').classList.add('active');
    var keys = Object.keys(messages).sort();
    if (keys.length) { lastSeenMsg = keys[keys.length-1]; localStorage.setItem('lastSeenMsg', lastSeenMsg); }
    unreadCount = 0;
    updateChatBadge();
    setTimeout(scrollChat, 100);
  } else if (tab === 'map') {
    document.getElementById('map-section').classList.add('active');
    setTimeout(initMap, 100);
  } else if (tab === 'gastos') {
    document.getElementById('gastos-section').classList.add('active');
  } else {
    document.getElementById('tab-' + tab).classList.add('active');
  }
}

function setWho(who) {
  currentWho = who;
  document.querySelectorAll('.who-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-who') === who);
  });
}

function addItem(tab) {
  var inp = document.getElementById('inp-' + tab);
  var text = inp.value.trim();
  if (!text) return;
  var item = { text: text, checked: false, addedBy: currentUser, ts: Date.now() };
  if (tab === 'personal') item.who = currentWho;
  db.ref('lists/' + tab).push(item);
  inp.value = '';
}

function toggleItem(tab, id) {
  var item = lists[tab][id];
  if (!item) return;
  db.ref('lists/' + tab + '/' + id).update({ checked: !item.checked });
}

function deleteItem(tab, id) { db.ref('lists/' + tab + '/' + id).remove(); }

function renderList(tab) {
  var items = lists[tab] || {};
  var arr = Object.entries(items).sort(function(a,b) { return (a[1].ts||0)-(b[1].ts||0); });
  var checked = arr.filter(function(x) { return x[1].checked; }).length;
  var total = arr.length;
  var pct = total ? Math.round(checked/total*100) : 0;
  document.getElementById('pb-'+tab).style.width = pct+'%';
  document.getElementById('pl-'+tab).textContent = total ? checked+' de '+total+' listos ('+pct+'%)' : '';
  var container = document.getElementById('list-'+tab);
  if (!total) { container.innerHTML = '<div class="empty"><span class="empty-icon">📋</span>Agregá el primer ítem</div>'; return; }
  if (tab === 'personal') {
    var groups = {'Los 2':[],'Tomi':[],'Ara':[]};
    arr.forEach(function(pair) {
      var g = pair[1].who || 'Los 2';
      if (!groups[g]) groups[g] = [];
      groups[g].push(pair);
    });
    var labels = {'Los 2':'👫 Para los dos','Tomi':'🧑‍🦱 Tomi','Ara':'👩‍🦱 Ara'};
    container.innerHTML = '';
    ['Los 2','Tomi','Ara'].forEach(function(grp) {
      if (!groups[grp] || !groups[grp].length) return;
      var div = document.createElement('div');
      div.innerHTML = '<div class="cat-header">'+labels[grp]+'</div>' + groups[grp].map(function(p) { return itemHTML(tab,p[0],p[1]); }).join('');
      container.appendChild(div);
    });
  } else {
    container.innerHTML = arr.map(function(p) { return itemHTML(tab,p[0],p[1]); }).join('');
  }
}

function itemHTML(tab, id, v) {
  return '<div class="item '+(v.checked?'checked':'')+'">' +
    '<button class="chk" onclick="toggleItem(\''+tab+'\',\''+id+'\')">'+(v.checked?'✓':'')+'</button>' +
    '<span class="item-text">'+esc(v.text)+'</span>' +
    '<button class="del-btn" onclick="deleteItem(\''+tab+'\',\''+id+'\')">✕</button></div>';
}

function initMap() {
  if (mapInstance) { mapInstance.invalidateSize(); return; }
  mapInstance = L.map('leaflet-map').setView([-38.0055, -57.5426], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(mapInstance);
  mapInstance.on('click', function(e) {
    var name = document.getElementById('map-place-input').value.trim();
    if (!name) { alert('Escribí el nombre del lugar primero'); return; }
    addPlaceAtCoords(name, e.latlng.lat, e.latlng.lng);
    document.getElementById('map-place-input').value = '';
  });
  renderMapMarkers();
}

function addPlace() {
  var name = document.getElementById('map-place-input').value.trim();
  if (!name) return;
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(name + ' Mar del Plata') + '&format=json&limit=1')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d[0]) {
        addPlaceAtCoords(name, parseFloat(d[0].lat), parseFloat(d[0].lon));
        document.getElementById('map-place-input').value = '';
        if (mapInstance) mapInstance.setView([parseFloat(d[0].lat), parseFloat(d[0].lon)], 15);
      } else {
        alert('No encontré ese lugar. Tocá el mapa para marcarlo.');
      }
    })
    .catch(function() { alert('Error buscando. Tocá el mapa para marcarlo.'); });
}

function addPlaceAtCoords(name, lat, lng) {
  var type = 'paseo';
  var nl = name.toLowerCase();
  if (nl.indexOf('playa') >= 0 || nl.indexOf('bristol') >= 0 || nl.indexOf('varese') >= 0) type = 'playa';
  else if (nl.indexOf('rest') >= 0 || nl.indexOf('pizza') >= 0 || nl.indexOf('parrilla') >= 0 || nl.indexOf('sushi') >= 0) type = 'restaurant';
  else if (nl.indexOf('bar') >= 0 || nl.indexOf('pub') >= 0 || nl.indexOf('cerveza') >= 0 || nl.indexOf('cafe') >= 0) type = 'bar';
  db.ref('places').push({ name: name, lat: lat, lng: lng, type: type, visited: false, addedBy: currentUser, ts: Date.now() });
}

function renderMapMarkers() {
  if (!mapInstance) return;
  Object.keys(mapMarkers).forEach(function(id) { mapInstance.removeLayer(mapMarkers[id]); });
  mapMarkers = {};
  var typeIcons = { playa:'🏖', restaurant:'🍽', bar:'🍺', paseo:'🚶' };
  Object.entries(places).forEach(function(pair) {
    var id = pair[0], p = pair[1];
    if (currentMapFilter !== 'todos') {
      if (currentMapFilter === 'visitado' && !p.visited) return;
      if (currentMapFilter !== 'visitado' && p.type !== currentMapFilter) return;
    }
    var iconHtml = '<div style="font-size:1.6rem">' + (p.visited ? '✅' : (typeIcons[p.type] || '📍')) + '</div>';
    var icon = L.divIcon({ html: iconHtml, className: '', iconSize: [30,30], iconAnchor: [15,15] });
    var marker = L.marker([p.lat, p.lng], {icon: icon}).addTo(mapInstance);
    var visitBtnClass = p.visited ? 'btn-visit-red' : 'btn-visit-green';
    var visitBtnText = p.visited ? '❌ Desmarcar' : '✅ Visitado';
    var popupHtml = '<div class="place-popup">' +
      '<h4>' + (p.visited ? '✅ ' : '') + esc(p.name) + '</h4>' +
      '<p>' + (typeIcons[p.type]||'📍') + ' ' + p.type + (p.addedBy ? ' · por ' + p.addedBy : '') + '</p>' +
      '<div class="place-popup-btns">' +
      '<button class="' + visitBtnClass + '" onclick="toggleVisited(\'' + id + '\',' + p.visited + ')">' + visitBtnText + '</button>' +
      '<button class="btn-del-place" onclick="deletePlace(\'' + id + '\')">🗑 Borrar</button>' +
      '</div></div>';
    marker.bindPopup(popupHtml);
    mapMarkers[id] = marker;
  });
}

function toggleVisited(id, current) {
  db.ref('places/'+id).update({ visited: !current });
  if (mapInstance) mapInstance.closePopup();
}

function deletePlace(id) {
  db.ref('places/'+id).remove();
  if (mapInstance) mapInstance.closePopup();
}

function toggleDropdown(e, ddId, type) {
  e.stopPropagation();
  var dd = document.getElementById(ddId);
  var isOpen = dd.classList.contains('open');
  closeAllDropdowns();
  document.querySelectorAll('.map-type-btn').forEach(function(b) { b.classList.remove('active'); });
  currentMapFilter = type;
  renderMapMarkers();
  e.currentTarget.classList.add('active');
  if (!isOpen) {
    populateDropdown(dd, type);
    dd.classList.add('open');
  }
}

function closeAllDropdowns() {
  document.querySelectorAll('.map-dropdown').forEach(function(d) { d.classList.remove('open'); });
}

function populateDropdown(dd, type) {
  var typeIcons = { playa:'🏖', restaurant:'🍽', bar:'🍺', paseo:'🚶' };
  var arr = Object.entries(places).filter(function(pair) {
    var p = pair[1];
    if (type === 'todos') return true;
    if (type === 'visitado') return p.visited;
    return p.type === type;
  }).sort(function(a,b) { return (a[1].name||'').localeCompare(b[1].name||''); });

  if (!arr.length) {
    dd.innerHTML = '<div class="map-dd-empty">No hay lugares todavía</div>';
    return;
  }
  dd.innerHTML = arr.map(function(pair) {
    var id = pair[0], p = pair[1];
    var icon = p.visited ? '✅' : (typeIcons[p.type] || '📍');
    return '<div class="map-dd-item" onclick="flyToPlace(' + p.lat + ',' + p.lng + ',\'' + id + '\')">' +
      '<span>' + icon + '</span><span>' + esc(p.name) + '</span></div>';
  }).join('');
}

function flyToPlace(lat, lng, id) {
  closeAllDropdowns();
  if (mapInstance) {
    mapInstance.setView([lat, lng], 16, { animate: true });
    var marker = mapMarkers[id];
    if (marker) setTimeout(function() { marker.openPopup(); }, 400);
  }
}

document.addEventListener('click', function() { closeAllDropdowns(); });

function setGastoType(type) {
  currentGastoType = type;
  document.querySelectorAll('.gasto-type-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-gtype') === type);
  });
}

function handleTicketPhoto(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result;
    document.getElementById('foto-preview').src = base64;
    document.getElementById('foto-preview').style.display = 'block';
    ticketPhotoBase64 = base64.split(',')[1];
    runOCR(ticketPhotoBase64);
  };
  reader.readAsDataURL(file);
}

function runOCR(base64) {
  document.getElementById('ocr-status').innerHTML = '<span class="spinner"></span> Detectando importe...';
  fetch('https://vision.googleapis.com/v1/images:annotate?key=' + VISION_KEY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION', maxResults: 1 }] }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var text = (d.responses && d.responses[0] && d.responses[0].fullTextAnnotation) ? d.responses[0].fullTextAnnotation.text : '';
    var numbers = text.match(/\$?\s*[\d.,]+/g) || [];
    var amounts = numbers.map(function(n) {
      return parseFloat(n.replace(/[^0-9.,]/g,'').replace(',','.'));
    }).filter(function(n) { return n > 0 && n < 9999999; });
    var amount = amounts.length ? Math.max.apply(null, amounts) : 0;
    if (amount > 0) {
      document.getElementById('gasto-monto').value = amount;
      document.getElementById('ocr-status').textContent = '✅ Importe detectado: $' + amount;
    } else {
      document.getElementById('ocr-status').textContent = '⚠️ No pude detectar el importe, ingresalo a mano';
    }
  })
  .catch(function() {
    document.getElementById('ocr-status').textContent = '⚠️ Error al leer el ticket, ingresalo a mano';
  });
}

function agregarGasto() {
  var desc = document.getElementById('gasto-desc').value.trim();
  var monto = parseFloat(document.getElementById('gasto-monto').value);
  if (!desc || !monto || monto <= 0) { alert('Completá la descripción y el importe'); return; }
  db.ref('gastos').push({
    desc: desc, monto: monto, type: currentGastoType,
    addedBy: currentUser, ts: Date.now(),
    photo: ticketPhotoBase64 ? ('data:image/jpeg;base64,' + ticketPhotoBase64) : null
  });
  document.getElementById('gasto-desc').value = '';
  document.getElementById('gasto-monto').value = '';
  document.getElementById('foto-preview').style.display = 'none';
  document.getElementById('foto-preview').src = '';
  document.getElementById('ocr-status').textContent = '';
  document.getElementById('ticket-input').value = '';
  ticketPhotoBase64 = null;
}

function deleteGasto(id) { db.ref('gastos/'+id).remove(); }

function renderGastos() {
  var arr = Object.entries(gastos).sort(function(a,b) { return (a[1].ts||0)-(b[1].ts||0); });
  var totalComp = 0, totalTomi = 0, totalAra = 0;
  arr.forEach(function(pair) {
    var g = pair[1];
    if (g.type === 'compartido') totalComp += g.monto;
    else if (g.type === 'Tomi') totalTomi += g.monto;
    else if (g.type === 'Ara') totalAra += g.monto;
  });
  document.getElementById('total-general').textContent = '$' + fmtMoney(totalComp + totalTomi + totalAra);
  document.getElementById('total-compartido').textContent = '$' + fmtMoney(totalComp);
  document.getElementById('total-tomi').textContent = '$' + fmtMoney(totalTomi + totalComp/2);
  document.getElementById('total-ara').textContent = '$' + fmtMoney(totalAra + totalComp/2);
  var container = document.getElementById('gastos-list');
  if (!arr.length) { container.innerHTML = '<div class="empty"><span class="empty-icon">💸</span>Todavía no hay gastos</div>'; return; }
  container.innerHTML = arr.slice().reverse().map(function(pair) {
    var id = pair[0], g = pair[1];
    var cls = g.type === 'compartido' ? 'compartido' : g.type.toLowerCase();
    var tagCls = g.type === 'compartido' ? 'tag-compartido' : (g.type === 'Tomi' ? 'tag-tomi' : 'tag-ara');
    var tagLabel = g.type === 'compartido' ? '👫 Compartido' : (g.type === 'Tomi' ? '🧑‍🦱 Tomi' : '👩‍🦱 Ara');
    var each = g.type === 'compartido' ? ' · c/u $'+fmtMoney(g.monto/2) : '';
    var d = new Date(g.ts);
    var time = d.getDate()+'/'+(d.getMonth()+1)+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    return '<div class="gasto-item">' +
      '<div class="gasto-item-header">' +
      '<span class="gasto-item-desc">'+esc(g.desc)+'</span>' +
      '<div style="display:flex;align-items:center;gap:6px">' +
      '<span class="gasto-item-amount '+cls+'">$'+fmtMoney(g.monto)+'</span>' +
      (g.photo ? '<img class="gasto-ticket-thumb" src="'+g.photo+'" onclick="openLightbox(this.src)">' : '') +
      '<button class="gasto-del" onclick="deleteGasto(\''+id+'\')">✕</button>' +
      '</div></div>' +
      '<div class="gasto-item-meta">' +
      '<span class="gasto-item-tag '+tagCls+'">'+tagLabel+'</span>' +
      '<span class="gasto-item-each">'+each+' '+time+'</span>' +
      '</div></div>';
  }).join('');
}

function fmtMoney(n) { return Math.round(n).toLocaleString('es-AR'); }

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

function onTyping() {
  if (!currentUser) return;
  db.ref('typing/'+currentUser).set({typing:true});
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(function() { db.ref('typing/'+currentUser).set({typing:false}); }, 2000);
}

function sendMessage() {
  var inp = document.getElementById('chat-input');
  var text = inp.value.trim();
  if (!text || !currentUser) return;
  inp.value = '';
  db.ref('typing/'+currentUser).set({typing:false});
  db.ref('messages').push({ from: currentUser, text: text, ts: Date.now() });
}

function renderMessages() {
  var container = document.getElementById('chat-messages');
  var arr = Object.entries(messages).sort(function(a,b) { return a[1].ts-b[1].ts; });
  if (!arr.length) { container.innerHTML = '<div class="empty"><span class="empty-icon">💬</span>Empezá la conversación</div>'; return; }
  container.innerHTML = arr.map(function(pair) {
    var m = pair[1], mine = m.from === currentUser;
    var d = new Date(m.ts);
    var time = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    return '<div class="msg '+(mine?'mine':'theirs')+'">' +
      '<div class="msg-bubble">'+esc(m.text)+'</div>' +
      '<div class="msg-meta">'+(mine?'':m.from+' · ')+time+'</div></div>';
  }).join('');
  if (inChat) scrollChat();
}

function scrollChat() { var c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight; }

function updateChatBadge() {
  var b = document.getElementById('chat-badge');
  if (unreadCount > 0) { b.textContent = unreadCount; b.classList.add('show'); }
  else { b.classList.remove('show'); }
}

function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
