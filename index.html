<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌊 Mar del Plata</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase COMPAT (funciona en Safari iOS sin problemas) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  :root {
    --sand: #f5e6c8;
    --wave: #2e7da8;
    --sun: #f4a923;
    --coral: #e8635a;
    --dark: #0d2235;
    --mid: #1e4a68;
    --glass: rgba(255,255,255,0.05);
    --glass-b: rgba(255,255,255,0.09);
    --tomi: #f4a923;
    --ara: #e8635a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark); color: var(--sand);
    min-height: 100vh; overflow-x: hidden;
    padding-bottom: 80px;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 15% 60%, rgba(46,125,168,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 10%, rgba(244,169,35,0.09) 0%, transparent 50%),
      linear-gradient(180deg, #0a1e30 0%, #0d2235 60%, #0a1e30 100%);
  }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    background: linear-gradient(180deg, #0a1e30 0%, #0d2235 100%);
  }
  .login-title {
    font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900;
    background: linear-gradient(135deg, var(--sand) 0%, var(--sun) 60%, var(--coral) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center; line-height: 1.1; margin-bottom: 8px;
  }
  .login-sub { color: rgba(245,230,200,0.45); font-size: 0.9rem; margin-bottom: 40px; text-align: center; }
  .login-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(245,230,200,0.4); margin-bottom: 14px; }
  .user-cards { display: flex; gap: 16px; width: 100%; max-width: 320px; }
  .user-card {
    flex: 1; padding: 28px 16px;
    background: var(--glass); border: 2px solid var(--glass-b);
    border-radius: 20px; display: flex; flex-direction: column;
    align-items: center; gap: 12px; cursor: pointer; transition: all 0.22s;
    user-select: none;
  }
  .user-card:active { transform: scale(0.95); }
  .user-card.tomi { border-color: rgba(244,169,35,0.3); }
  .user-card.tomi:active { background: rgba(244,169,35,0.12); border-color: var(--tomi); }
  .user-card.ara { border-color: rgba(232,99,90,0.3); }
  .user-card.ara:active { background: rgba(232,99,90,0.12); border-color: var(--ara); }
  .user-card .av { font-size: 3rem; line-height: 1; }
  .user-card .nm { font-size: 1.1rem; font-weight: 700; }

  /* APP */
  #app { position: relative; z-index: 1; display: none; }

  /* HEADER */
  header { padding: 18px 16px 0; display: flex; align-items: flex-start; justify-content: space-between; }
  .header-left .header-title {
    font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900;
    background: linear-gradient(135deg, var(--sand), var(--sun));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .you-badge { font-size: 0.66rem; color: rgba(245,230,200,0.32); margin-top: 2px; }
  .presence-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--glass); border: 1px solid var(--glass-b);
    border-radius: 20px; padding: 6px 11px; font-size: 0.72rem;
    color: rgba(245,230,200,0.45); transition: all 0.3s; white-space: nowrap;
    margin-top: 2px;
  }
  .presence-pill.online { border-color: rgba(76,175,80,0.4); color: #7ed98a; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(245,230,200,0.2); transition: background 0.3s; flex-shrink: 0; }
  .presence-pill.online .dot { background: #4caf50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

  /* TABS */
  .tabs { display: flex; gap: 6px; padding: 14px 16px 0; }
  .tab {
    flex: 1; padding: 9px 4px;
    background: var(--glass); border: 1px solid var(--glass-b);
    border-radius: 11px; color: rgba(245,230,200,0.38);
    font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500;
    cursor: pointer; transition: all 0.18s; text-align: center; line-height: 1.4;
    -webkit-appearance: none; appearance: none;
  }
  .tab .ti { font-size: 1.05rem; display: block; margin-bottom: 1px; }
  .tab.active { background: var(--mid); border-color: rgba(46,125,168,0.5); color: var(--sand); }

  /* SECTIONS */
  .section { display: none; padding: 14px 16px 0; }
  .section.active { display: block; }

  /* ADD FORM */
  .add-form { display: flex; gap: 8px; margin-bottom: 14px; }
  .add-form input {
    flex: 1; background: var(--glass); border: 1px solid var(--glass-b);
    border-radius: 11px; padding: 11px 13px; color: var(--sand);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
    transition: border-color 0.18s; -webkit-appearance: none;
  }
  .add-form input::placeholder { color: rgba(245,230,200,0.22); }
  .add-form input:focus { border-color: var(--wave); }
  .add-form button {
    background: var(--wave); border: none; border-radius: 11px;
    padding: 11px 15px; color: white; font-size: 1.3rem;
    cursor: pointer; transition: all 0.15s; min-width: 46px;
    -webkit-appearance: none;
  }
  .add-form button:active { transform: scale(0.92); }

  /* PROGRESS */
  .prog-label { font-size: 0.7rem; color: rgba(245,230,200,0.32); margin-bottom: 5px; }
  .prog-wrap { background: rgba(255,255,255,0.06); border-radius: 20px; height: 5px; margin-bottom: 16px; overflow: hidden; }
  .prog-bar { height: 100%; background: linear-gradient(90deg, var(--wave), var(--sun)); border-radius: 20px; transition: width 0.4s ease; }

  /* WHO */
  .who-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .who-row span { font-size: 0.72rem; color: rgba(245,230,200,0.32); }
  .who-btn {
    padding: 5px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: rgba(245,230,200,0.42);
    font-family: 'DM Sans', sans-serif; font-size: 0.76rem; cursor: pointer;
    transition: all 0.16s; -webkit-appearance: none;
  }
  .who-btn.active { font-weight: 600; }
  .who-btn[data-who="Los 2"].active { background: rgba(46,125,168,0.22); border-color: var(--wave); color: #7ec8e3; }
  .who-btn[data-who="Tomi"].active  { background: rgba(244,169,35,0.18); border-color: var(--tomi); color: var(--tomi); }
  .who-btn[data-who="Ara"].active   { background: rgba(232,99,90,0.18);  border-color: var(--ara);  color: var(--ara); }

  /* ITEMS */
  .cat-header { font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245,230,200,0.28); margin-bottom: 7px; padding-left: 2px; }
  .item {
    display: flex; align-items: center; gap: 10px;
    background: var(--glass); border: 1px solid var(--glass-b);
    border-radius: 11px; padding: 12px 11px; margin-bottom: 6px;
    transition: all 0.18s;
  }
  .item.checked { background: rgba(76,175,80,0.06); border-color: rgba(76,175,80,0.18); }
  .item.checked .item-text { text-decoration: line-through; color: rgba(245,230,200,0.28); }
  .chk {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.18); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; flex-shrink: 0; transition: all 0.16s;
    -webkit-appearance: none;
  }
  .item.checked .chk { background: #4caf50; border-color: #4caf50; color: white; }
  .item-text { flex: 1; font-size: 0.88rem; line-height: 1.3; }
  .del-btn {
    background: none; border: none; color: rgba(245,230,200,0.16);
    cursor: pointer; font-size: 1rem; padding: 4px 6px; flex-shrink: 0;
    transition: color 0.16s; -webkit-appearance: none;
  }
  .del-btn:active { color: var(--coral); }
  .empty { text-align: center; padding: 36px 20px; color: rgba(245,230,200,0.2); font-size: 0.86rem; }
  .empty-icon { font-size: 2rem; display: block; margin-bottom: 8px; }

  /* CHAT */
  #chat-section { display: none; padding: 0; flex-direction: column; height: calc(100vh - 128px); }
  #chat-section.active { display: flex; }
  .chat-header-bar { padding: 14px 16px 10px; border-bottom: 1px solid var(--glass-b); }
  .chat-header-bar .cht { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
  .chat-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; display: flex; flex-direction: column; gap: 9px; }
  .msg { max-width: 78%; }
  .msg.mine { align-self: flex-end; }
  .msg.theirs { align-self: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.88rem; line-height: 1.4; word-break: break-word; }
  .msg.mine .msg-bubble { background: var(--mid); border-bottom-right-radius: 5px; }
  .msg.theirs .msg-bubble { background: rgba(232,99,90,0.14); border: 1px solid rgba(232,99,90,0.22); border-bottom-left-radius: 5px; }
  .msg-meta { font-size: 0.62rem; color: rgba(245,230,200,0.28); margin-top: 3px; padding: 0 4px; }
  .msg.mine .msg-meta { text-align: right; }
  .typing-indicator { font-size: 0.72rem; color: rgba(245,230,200,0.28); padding: 6px 16px 4px; min-height: 24px; font-style: italic; }
  .chat-input-area {
    display: flex; gap: 8px; padding: 10px 14px 12px;
    background: rgba(10,28,46,0.97); border-top: 1px solid var(--glass-b);
  }
  .chat-input-area input {
    flex: 1; background: var(--glass); border: 1px solid var(--glass-b);
    border-radius: 24px; padding: 10px 15px; color: var(--sand);
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none;
    -webkit-appearance: none;
  }
  .chat-input-area input::placeholder { color: rgba(245,230,200,0.22); }
  .chat-input-area input:focus { border-color: rgba(232,99,90,0.35); }
  .send-btn {
    background: var(--coral); border: none; border-radius: 50%;
    width: 42px; height: 42px; color: white; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.14s; -webkit-appearance: none;
  }
  .send-btn:active { transform: scale(0.9); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: rgba(10,28,46,0.97);
    border-top: 1px solid var(--glass-b);
    display: flex; padding: 8px 12px env(safe-area-inset-bottom, 10px); gap: 4px;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 7px 4px; border-radius: 11px; border: none;
    background: transparent; color: rgba(245,230,200,0.32);
    font-family: 'DM Sans', sans-serif; font-size: 0.62rem; font-weight: 500;
    cursor: pointer; transition: all 0.16s; position: relative;
    -webkit-appearance: none;
  }
  .nav-btn .ni { font-size: 1.25rem; }
  .nav-btn.active { color: var(--sand); background: var(--glass); }
  .chat-badge {
    position: absolute; top: 3px; right: 16%;
    background: var(--coral); color: white;
    font-size: 0.58rem; font-weight: 700;
    border-radius: 10px; padding: 1px 5px;
    min-width: 16px; text-align: center; display: none;
  }
  .chat-badge.show { display: block; }
</style>
</head>
<body>
<div class="bg"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-title">🌊 Mar del Plata</div>
  <div class="login-sub">Bahía Blanca → la costa 🌅</div>
  <div class="login-label">¿Quién sos?</div>
  <div class="user-cards">
    <div class="user-card tomi" onclick="doLogin('Tomi')">
      <div class="av">🧑‍🦱</div>
      <div class="nm" style="color:var(--tomi)">Tomi</div>
    </div>
    <div class="user-card ara" onclick="doLogin('Ara')">
      <div class="av">👩‍🦱</div>
      <div class="nm" style="color:var(--ara)">Ara</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-title">🌊 Mar del Plata</div>
      <div class="you-badge" id="you-badge"></div>
    </div>
    <div class="presence-pill" id="presence-pill">
      <div class="dot"></div>
      <span id="presence-text">Conectando...</span>
    </div>
  </header>

  <div class="tabs" id="main-tabs">
    <button class="tab active" onclick="switchTab('personal')"><span class="ti">🎒</span>Personal</button>
    <button class="tab" onclick="switchTab('bahia')"><span class="ti">🏠</span>De Bahía</button>
    <button class="tab" onclick="switchTab('mdp')"><span class="ti">🛒</span>Comprar</button>
  </div>

  <!-- PERSONAL -->
  <div id="tab-personal" class="section active">
    <div class="who-row">
      <span>Para:</span>
      <button class="who-btn active" data-who="Los 2" onclick="setWho('Los 2')">Los 2</button>
      <button class="who-btn" data-who="Tomi" onclick="setWho('Tomi')">Tomi</button>
      <button class="who-btn" data-who="Ara" onclick="setWho('Ara')">Ara</button>
    </div>
    <div class="add-form">
      <input id="inp-personal" type="text" placeholder="Agregar cosa..." onkeypress="handleKey(event,'personal')">
      <button onclick="addItem('personal')">+</button>
    </div>
    <div class="prog-label" id="pl-personal"></div>
    <div class="prog-wrap"><div class="prog-bar" id="pb-personal" style="width:0%"></div></div>
    <div id="list-personal"></div>
  </div>

  <!-- BAHÍA -->
  <div id="tab-bahia" class="section">
    <div class="add-form">
      <input id="inp-bahia" type="text" placeholder="Agregar mercadería..." onkeypress="handleKey(event,'bahia')">
      <button onclick="addItem('bahia')">+</button>
    </div>
    <div class="prog-label" id="pl-bahia"></div>
    <div class="prog-wrap"><div class="prog-bar" id="pb-bahia" style="width:0%"></div></div>
    <div id="list-bahia"></div>
  </div>

  <!-- MDP -->
  <div id="tab-mdp" class="section">
    <div class="add-form">
      <input id="inp-mdp" type="text" placeholder="Agregar lo que hay que comprar..." onkeypress="handleKey(event,'mdp')">
      <button onclick="addItem('mdp')">+</button>
    </div>
    <div class="prog-label" id="pl-mdp"></div>
    <div class="prog-wrap"><div class="prog-bar" id="pb-mdp" style="width:0%"></div></div>
    <div id="list-mdp"></div>
  </div>

  <!-- CHAT -->
  <div id="chat-section" class="section">
    <div class="chat-header-bar"><div class="cht">💬 Chat</div></div>
    <div class="chat-messages" id="chat-messages">
      <div class="empty"><span class="empty-icon">💬</span>Empezá la conversación</div>
    </div>
    <div class="typing-indicator" id="typing-indicator"></div>
    <div class="chat-input-area">
      <input id="chat-input" type="text" placeholder="Escribí algo..." onkeypress="handleChatKey(event)" oninput="onTyping()">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-personal" onclick="switchTab('personal')"><span class="ni">🎒</span>Personal</button>
  <button class="nav-btn" id="nav-bahia" onclick="switchTab('bahia')"><span class="ni">🏠</span>De Bahía</button>
  <button class="nav-btn" id="nav-mdp" onclick="switchTab('mdp')"><span class="ni">🛒</span>Comprar</button>
  <button class="nav-btn" id="nav-chat" onclick="switchTab('chat')">
    <span class="ni">💬</span>Chat
    <div class="chat-badge" id="chat-badge"></div>
  </button>
</div>

<script>
// ── Firebase init (compat SDK — funciona en Safari iOS) ──
var firebaseConfig = {
  apiKey: "AIzaSyABMylgsg7sI21YAhjk45Ikm5bfDyYA_7c",
  authDomain: "lista-mardel.firebaseapp.com",
  projectId: "lista-mardel",
  storageBucket: "lista-mardel.firebasestorage.app",
  messagingSenderId: "127574105798",
  appId: "1:127574105798:web:a13c68862476fb42de81c7",
  databaseURL: "https://lista-mardel-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ── State ──
var currentUser = null;
var currentWho = 'Los 2';
var currentTab = 'personal';
var lists = { personal: {}, bahia: {}, mdp: {} };
var messages = {};
var typingTimeout = null;
var lastSeenMsg = localStorage.getItem('lastSeenMsg') || '';
var unreadCount = 0;
var inChat = false;
var seeded = {};

var DEFAULTS = {
  personal: [
    { text:'Ropa para salir', who:'Los 2', checked:false },
    { text:'Malla / traje de baño', who:'Los 2', checked:false },
    { text:'Cargador del celu', who:'Los 2', checked:false },
    { text:'Documentos (DNI)', who:'Los 2', checked:false },
    { text:'Ropa interior y medias', who:'Los 2', checked:false },
    { text:'Pijama', who:'Los 2', checked:false },
    { text:'Zapatillas y ojotas', who:'Los 2', checked:false },
    { text:'Anteojos de sol', who:'Los 2', checked:false },
    { text:'Protector solar', who:'Los 2', checked:false },
    { text:'Neceser con artículos de higiene', who:'Los 2', checked:false },
    { text:'Toalla de playa', who:'Los 2', checked:false },
    { text:'Botiquín básico', who:'Los 2', checked:false },
    { text:'Auriculares', who:'Los 2', checked:false },
    { text:'Powerbank', who:'Los 2', checked:false }
  ],
  bahia: [
    { text:'Yerba y mate', checked:false },
    { text:'Azúcar', checked:false },
    { text:'Café', checked:false },
    { text:'Galletitas', checked:false },
    { text:'Snacks varios', checked:false }
  ],
  mdp: [
    { text:'Frutas y verduras', checked:false },
    { text:'Pan y fiambres', checked:false },
    { text:'Bebidas', checked:false }
  ]
};

// ── Login ──
function doLogin(user) {
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('you-badge').textContent = 'Conectado como ' + user;

  // Presence
  var presRef = db.ref('presence/' + user);
  presRef.set({ online: true, ts: firebase.database.ServerValue.TIMESTAMP });
  presRef.onDisconnect().set({ online: false, ts: firebase.database.ServerValue.TIMESTAMP });

  // Watch other's presence
  var other = user === 'Tomi' ? 'Ara' : 'Tomi';
  db.ref('presence/' + other).on('value', function(snap) {
    var d = snap.val();
    var pill = document.getElementById('presence-pill');
    var txt = document.getElementById('presence-text');
    if (d && d.online) {
      pill.className = 'presence-pill online';
      txt.textContent = other + ' en línea 🟢';
    } else {
      pill.className = 'presence-pill';
      txt.textContent = other + ' desconectada';
    }
  });

  // Watch other's typing
  db.ref('typing/' + other).on('value', function(snap) {
    var d = snap.val();
    document.getElementById('typing-indicator').textContent = (d && d.typing) ? other + ' está escribiendo...' : '';
  });

  // Watch lists
  ['personal', 'bahia', 'mdp'].forEach(function(tab) {
    db.ref('lists/' + tab).on('value', function(snap) {
      var val = snap.val();
      if (!val && !seeded[tab]) {
        seeded[tab] = true;
        DEFAULTS[tab].forEach(function(item) {
          db.ref('lists/' + tab).push(Object.assign({}, item, { ts: Date.now() }));
        });
      } else if (val) {
        seeded[tab] = true;
        lists[tab] = val;
        renderList(tab);
      }
    });
  });

  // Watch messages
  db.ref('messages').on('value', function(snap) {
    messages = snap.val() || {};
    renderMessages();
    if (!inChat) {
      var keys = Object.keys(messages);
      var newCount = keys.filter(function(k) {
        return k > lastSeenMsg && messages[k].from !== currentUser;
      }).length;
      unreadCount = newCount;
      updateChatBadge();
    }
  });
}

// Visibility change → update presence
document.addEventListener('visibilitychange', function() {
  if (!currentUser) return;
  db.ref('presence/' + currentUser).set({
    online: !document.hidden,
    ts: firebase.database.ServerValue.TIMESTAMP
  });
});

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  inChat = (tab === 'chat');
  document.getElementById('main-tabs').style.display = (tab === 'chat') ? 'none' : 'flex';

  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  ['personal','bahia','mdp','chat'].forEach(function(t) {
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
  });

  if (tab === 'chat') {
    document.getElementById('chat-section').classList.add('active');
    var keys = Object.keys(messages).sort();
    if (keys.length) { lastSeenMsg = keys[keys.length - 1]; localStorage.setItem('lastSeenMsg', lastSeenMsg); }
    unreadCount = 0;
    updateChatBadge();
    setTimeout(scrollChat, 100);
    document.getElementById('chat-input').focus();
  } else {
    document.getElementById('tab-' + tab).classList.add('active');
  }
}

// ── Who ──
function setWho(who) {
  currentWho = who;
  document.querySelectorAll('.who-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-who') === who);
  });
}

// ── List actions ──
function handleKey(e, tab) { if (e.key === 'Enter') addItem(tab); }

function addItem(tab) {
  var inp = document.getElementById('inp-' + tab);
  var text = inp.value.trim();
  if (!text) return;
  var item = { text: text, checked: false, addedBy: currentUser, ts: Date.now() };
  if (tab === 'personal') item.who = currentWho;
  db.ref('lists/' + tab).push(item);
  inp.value = '';
}

function toggleItem(tab, id) {
  var item = lists[tab][id];
  if (!item) return;
  db.ref('lists/' + tab + '/' + id).update({ checked: !item.checked });
}

function deleteItem(tab, id) {
  db.ref('lists/' + tab + '/' + id).remove();
}

function renderList(tab) {
  var items = lists[tab] || {};
  var arr = Object.entries(items).sort(function(a,b){ return (a[1].ts||0)-(b[1].ts||0); });
  var checked = arr.filter(function(x){ return x[1].checked; }).length;
  var total = arr.length;
  var pct = total ? Math.round(checked/total*100) : 0;

  document.getElementById('pb-' + tab).style.width = pct + '%';
  document.getElementById('pl-' + tab).textContent = total ? (checked + ' de ' + total + ' listos (' + pct + '%)') : '';

  var container = document.getElementById('list-' + tab);
  if (!total) {
    container.innerHTML = '<div class="empty"><span class="empty-icon">📋</span>Agregá el primer ítem</div>';
    return;
  }

  if (tab === 'personal') {
    var groups = { 'Los 2': [], 'Tomi': [], 'Ara': [] };
    arr.forEach(function(pair) {
      var g = pair[1].who || 'Los 2';
      if (!groups[g]) groups[g] = [];
      groups[g].push(pair);
    });
    var labels = { 'Los 2': '👫 Para los dos', 'Tomi': '🧑‍🦱 Tomi', 'Ara': '👩‍🦱 Ara' };
    container.innerHTML = '';
    ['Los 2','Tomi','Ara'].forEach(function(grp) {
      if (!groups[grp] || !groups[grp].length) return;
      var div = document.createElement('div');
      div.innerHTML = '<div class="cat-header">' + labels[grp] + '</div>' +
        groups[grp].map(function(pair){ return itemHTML(tab, pair[0], pair[1]); }).join('');
      container.appendChild(div);
    });
  } else {
    container.innerHTML = arr.map(function(pair){ return itemHTML(tab, pair[0], pair[1]); }).join('');
  }
}

function itemHTML(tab, id, v) {
  return '<div class="item ' + (v.checked ? 'checked' : '') + '">' +
    '<button class="chk" onclick="toggleItem(\'' + tab + '\',\'' + id + '\')">' + (v.checked ? '✓' : '') + '</button>' +
    '<span class="item-text">' + esc(v.text) + '</span>' +
    '<button class="del-btn" onclick="deleteItem(\'' + tab + '\',\'' + id + '\')">✕</button>' +
    '</div>';
}

// ── Chat ──
function handleChatKey(e) { if (e.key === 'Enter') sendMessage(); }

function onTyping() {
  if (!currentUser) return;
  db.ref('typing/' + currentUser).set({ typing: true });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(function() {
    db.ref('typing/' + currentUser).set({ typing: false });
  }, 2000);
}

function sendMessage() {
  var inp = document.getElementById('chat-input');
  var text = inp.value.trim();
  if (!text || !currentUser) return;
  inp.value = '';
  db.ref('typing/' + currentUser).set({ typing: false });
  db.ref('messages').push({ from: currentUser, text: text, ts: Date.now() });
}

function renderMessages() {
  var container = document.getElementById('chat-messages');
  var arr = Object.entries(messages).sort(function(a,b){ return a[1].ts - b[1].ts; });
  if (!arr.length) {
    container.innerHTML = '<div class="empty"><span class="empty-icon">💬</span>Empezá la conversación</div>';
    return;
  }
  container.innerHTML = arr.map(function(pair) {
    var m = pair[1];
    var mine = m.from === currentUser;
    var d = new Date(m.ts);
    var time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    return '<div class="msg ' + (mine ? 'mine' : 'theirs') + '">' +
      '<div class="msg-bubble">' + esc(m.text) + '</div>' +
      '<div class="msg-meta">' + (mine ? '' : m.from + ' · ') + time + '</div>' +
      '</div>';
  }).join('');
  if (inChat) scrollChat();
}

function scrollChat() {
  var c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

function updateChatBadge() {
  var b = document.getElementById('chat-badge');
  if (unreadCount > 0) { b.textContent = unreadCount; b.classList.add('show'); }
  else { b.classList.remove('show'); }
}

function esc(t) {
  return String(t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
</script>
</body>
</html>
